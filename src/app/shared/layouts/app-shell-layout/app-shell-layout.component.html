<div
  class="shell-layout"
  [ngClass]="layoutStore.shellClasses()"
>

  <!-- SIDEBAR -->
  <app-sidebar />

  @if (layoutStore.mobileDrawerOpen()) {

    <button
      class="drawer-backdrop"
      type="button"
      aria-label="Close navigation"
      (click)="layoutStore.closeMobileDrawer()"
    ></button>

  }

  <!-- MAIN -->
  <div
    id="main-content"
    class="shell-main"
  >

    <!-- TOPBAR -->
    <app-topbar />

    <!-- PAGE CONTENT -->
    <main
      class="shell-content"
      tabindex="-1"
    >

      <router-outlet />

    </main>

  </div>

</div>
